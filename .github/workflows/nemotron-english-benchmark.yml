name: Nemotron English Benchmark (FLEURS)

# Runs the English Nemotron 3.5 multilingual ship on FLEURS en_us and reports
# WER + RTFx on every relevant PR. The shipped ships use the B1 decoder⊕joint
# fusion path; K=4 smart-spec components are NOT published on the multilingual
# repo (the pruned/full tokenizers carry duplicate <blank> tokens that break
# the K=4 recovery step), so the decode path here is B1. Model is fetched from
# the gated HF repo using the HF_NEMOTRON_V2_TOKEN secret.

on:
  pull_request:
    branches: [main]
    paths:
      - 'Sources/FluidAudio/ASR/Parakeet/Streaming/Nemotron/**'
      - 'Sources/FluidAudioCLI/Commands/ASR/Parakeet/Streaming/NemotronMultilingual*.swift'
      - '.github/workflows/nemotron-english-benchmark.yml'
  workflow_dispatch:
    inputs:
      samples:
        description: 'FLEURS en_us samples'
        required: false
        default: '100'
      chunk_ms:
        description: 'Chunk tier (560 / 1120 / 2240 / 4480)'
        required: false
        default: '2240'

jobs:
  nemotron-english-benchmark:
    name: Nemotron English Benchmark (FLEURS)
    runs-on: macos-15
    permissions:
      contents: read
      pull-requests: write
    env:
      HF_TOKEN: ${{ secrets.HF_NEMOTRON_V2_TOKEN }}
      SAMPLES: ${{ github.event.inputs.samples || '100' }}
      CHUNK_MS: ${{ github.event.inputs.chunk_ms || '2240' }}

    steps:
      - uses: actions/checkout@v5

      - uses: swift-actions/setup-swift@v2
        with:
          swift-version: "6.1"

      - name: Cache dependencies, model + dataset
        uses: actions/cache@v4
        with:
          path: |
            .build
            ~/Library/Application Support/FluidAudio
          key: ${{ runner.os }}-nemotron-en-${{ hashFiles('Package.resolved', 'Sources/FluidAudio/ASR/Parakeet/Streaming/Nemotron/**', 'Sources/FluidAudio/ModelNames.swift') }}

      - name: Build
        run: swift build -c release

      - name: Run benchmark — English FLEURS (B1)
        id: bench
        continue-on-error: true
        run: |
          echo "=== English FLEURS, chunk ${CHUNK_MS}ms, ${SAMPLES} samples (B1 fused) ==="
          .build/release/fluidaudiocli nemotron-multilingual-benchmark \
            --auto-download \
            --languages en_us \
            --chunk-ms "$CHUNK_MS" \
            --dataset fleurs \
            --samples "$SAMPLES" \
            --output results.json \
            2>&1 | tee log.txt
          exit ${PIPESTATUS[0]}

      - name: Extract results
        if: always()
        id: extract
        run: |
          read_metric() { jq -r ".summary.$2 // \"N/A\"" "$1" 2>/dev/null || echo "N/A"; }
          pct() { [ "$1" = "N/A" ] && echo "N/A" || echo "$1 * 100" | bc -l | xargs printf "%.2f"; }
          one() { [ "$1" = "N/A" ] && echo "N/A" || echo "$1" | xargs printf "%.1f"; }

          WER=$(pct "$(read_metric results.json averageWER)")
          RTFX=$(one "$(read_metric results.json averageRTFx)")
          SAMP=$(jq -r '.summary.totalSamples // "N/A"' results.json 2>/dev/null || echo "N/A")

          {
            echo "wer=$WER"; echo "rtfx=$RTFX"; echo "samples=$SAMP"
          } >> "$GITHUB_OUTPUT"

          echo "English FLEURS (B1): WER ${WER}%  RTFx ${RTFX}x  (${SAMP} samples)"

          if [ "$RTFX" = "N/A" ] || [ "$RTFX" = "0.0" ]; then
            echo "❌ Run produced RTFx 0/N/A — benchmark failed"
            exit 1
          fi

      - name: Comment PR
        if: github.event_name == 'pull_request' && always()
        uses: actions/github-script@v7
        with:
          script: |
            const o = ${{ toJSON(steps.extract.outputs) }};
            const ok = '${{ steps.bench.outcome }}' === 'success';
            const body = `## ${ok ? '✅' : '❌'} Nemotron English Benchmark — FLEURS

            FLEURS \`en_us\`, chunk \`${{ env.CHUNK_MS }}ms\`, ${o.samples} samples, B1 fused decode path.

            | Decode path | WER | RTFx |
            |---|---:|---:|
            | **B1 (fused, shipped)** | **${o.wer}%** | **${o.rtfx}x** |

            ${ok ? '' : '⚠️ Run failed — see logs.'}

            <details><summary>Log (tail)</summary>

            \`\`\`
            ${require('fs').existsSync('log.txt') ? require('fs').readFileSync('log.txt','utf8').slice(-3000) : '(no log)'}
            \`\`\`
            </details>`;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body,
            });

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nemotron-english-benchmark-results
          path: |
            results.json
            log.txt
          retention-days: 30

      - name: Fail if the run failed
        if: steps.bench.outcome == 'failure'
        run: |
          echo "Benchmark run failed (see logs above)."
          exit 1
