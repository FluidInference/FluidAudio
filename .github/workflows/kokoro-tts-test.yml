name: Kokoro TTS Smoke Test

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  kokoro-tts-smoke-test:
    name: Kokoro TTS Smoke Test
    runs-on: macos-15
    permissions:
      contents: read
      pull-requests: write

    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v5

      - uses: swift-actions/setup-swift@v2
        with:
          swift-version: "6.1"

      - name: Cache Dependencies
        uses: actions/cache@v4
        with:
          path: |
            .build
            ~/Library/Application Support/FluidAudio/Models/kokoro-82m-coreml
            ~/Library/Caches/Homebrew
            /usr/local/Cellar/ffmpeg
            /opt/homebrew/Cellar/ffmpeg
          key: ${{ runner.os }}-kokoro-tts-${{ hashFiles('Package.resolved', 'Sources/FluidAudio/TTS/Kokoro/**', 'Sources/FluidAudio/ModelNames.swift') }}

      - name: Install ffmpeg
        run: |
          brew install ffmpeg || echo "ffmpeg may already be installed"

      - name: Build
        run: swift build -c release

      - name: Run Smoke Test
        id: smoketest
        run: |
          BENCHMARK_START=$(date +%s)

          echo "========================================="
          echo "Kokoro TTS smoke test"
          echo "========================================="
          echo ""

          TEXT="I can't believe we finally made it to the summit after climbing for twelve exhausting hours through wind and rain, but wow, this view of the endless mountain ranges stretching to the horizon makes every single difficult step completely worth the journey."

          SYNTH_START=$(date +%s)
          if .build/release/fluidaudiocli tts "$TEXT" \
            --output kokoro_output.wav \
            --auto-download 2>&1; then
            echo "Smoke test PASSED - pipeline completed without crash"
            echo "SMOKE_STATUS=PASSED" >> $GITHUB_OUTPUT
          else
            EXIT_CODE=$?
            echo "Smoke test FAILED with exit code $EXIT_CODE"
            echo "SMOKE_STATUS=FAILED" >> $GITHUB_OUTPUT
          fi
          SYNTH_END=$(date +%s)
          SYNTH_TIME=$((SYNTH_END - SYNTH_START))

          if [ -f kokoro_output.wav ]; then
            SIZE=$(stat -f%z kokoro_output.wav 2>/dev/null || stat -c%s kokoro_output.wav 2>/dev/null)
            echo "Output file size: $SIZE bytes"
            echo "FILE_SIZE=$SIZE" >> $GITHUB_OUTPUT

            # Calculate RTFx: audio_duration / processing_time
            # Get audio duration using ffprobe
            AUDIO_DURATION=$(ffprobe -v error -show_entries format=duration -of default=noprint_wrappers=1:nokey=1 kokoro_output.wav 2>/dev/null || echo "0")

            if [ "$SYNTH_TIME" -gt 0 ] && [ -n "$AUDIO_DURATION" ] && [ "$AUDIO_DURATION" != "0" ]; then
              RTFx=$(awk "BEGIN {printf \"%.2f\", $AUDIO_DURATION / $SYNTH_TIME}")
              echo "RTFx: ${RTFx}x (${AUDIO_DURATION}s audio / ${SYNTH_TIME}s processing)"
              echo "RTFx=$RTFx" >> $GITHUB_OUTPUT
            else
              echo "RTFx: N/A (could not calculate)"
              echo "RTFx=0.00" >> $GITHUB_OUTPUT
            fi
          else
            echo "FILE_SIZE=0" >> $GITHUB_OUTPUT
            echo "RTFx=0.00" >> $GITHUB_OUTPUT
          fi

          EXECUTION_TIME=$(( ($(date +%s) - BENCHMARK_START) / 60 ))m$(( ($(date +%s) - BENCHMARK_START) % 60 ))s
          echo "EXECUTION_TIME=$EXECUTION_TIME" >> $GITHUB_OUTPUT

          # Validate RTFx - 0 indicates benchmark failure
          RTFx_VAL=$(echo "${RTFx:-0}" | awk '{printf "%.2f", $1}')
          if [ "$RTFx_VAL" = "0.00" ] || [ "$RTFx_VAL" = "0.0" ] || [ "$RTFx_VAL" = "0" ] || [ -z "$RTFx_VAL" ]; then
            echo "❌ CRITICAL: RTFx is 0 - smoke test failed"
            echo "RTFx value: $RTFx_VAL"
            exit 1
          fi

      - name: Comment PR
        if: always() && github.event_name == 'pull_request'
        continue-on-error: true
        uses: actions/github-script@v7
        with:
          script: |
            const status = '${{ steps.smoketest.outputs.SMOKE_STATUS }}';
            const emoji = status === 'PASSED' ? '✅' : '❌';
            const fileSize = '${{ steps.smoketest.outputs.FILE_SIZE }}';
            const fileSizeKB = (parseInt(fileSize) / 1024).toFixed(1);
            const rtfx = '${{ steps.smoketest.outputs.RTFx }}' || '0.00';
            const rtfxFloat = parseFloat(rtfx);
            const rtfxStatus = rtfxFloat > 0 ? '✅' : '❌';

            const body = `## Kokoro TTS Smoke Test ${emoji}

            | Check | Result |
            |-------|--------|
            | Build | ✅ |
            | Model download | ${emoji} |
            | Model load | ${emoji} |
            | Synthesis pipeline | ${emoji} |
            | Output WAV | ${parseInt(fileSize) > 0 ? '✅' : '❌'} (${fileSizeKB} KB) |
            | RTFx | ${rtfxStatus} ${rtfx}x |

            <sub>Runtime: ${{ steps.smoketest.outputs.EXECUTION_TIME }}</sub>

            <sub>**Note:** Kokoro TTS uses CoreML flow matching + Vocos vocoder. CI VM lacks physical ANE — performance may differ from Apple Silicon.</sub>

            <!-- fluidaudio-kokoro-tts-test -->`;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = comments.find(c =>
              c.body.includes('<!-- fluidaudio-kokoro-tts-test -->')
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body: body
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: body
              });
            }

      - name: Upload Output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: kokoro-tts-output
          path: kokoro_output.wav
          retention-days: 7
