name: Nemotron Multilingual Benchmark (FLEURS)

# Benchmarks BOTH shipped models on FLEURS on every relevant PR, so a break in
# either model's download or decode path is caught:
#   - latin/        (Latin-script-pruned vocab) via English  -> WER
#   - multilingual/ (full 13087 vocab)          via Japanese -> CER
# The auto-downloader routes the language hint to the right folder
# (en_us -> latin, ja_jp -> multilingual). Decode path is B1 fused; K=4
# smart-spec components are not published (the tokenizers carry duplicate
# <blank> tokens that break K=4 recovery). Model is fetched from the gated HF
# repo using the HF_NEMOTRON_V2_TOKEN secret.

on:
  pull_request:
    branches: [main]
    paths:
      - 'Sources/FluidAudio/ASR/Parakeet/Streaming/Nemotron/**'
      - 'Sources/FluidAudioCLI/Commands/ASR/Parakeet/Streaming/NemotronMultilingual*.swift'
      - '.github/workflows/nemotron-multilingual-benchmark.yml'
  workflow_dispatch:
    inputs:
      samples:
        description: 'FLEURS samples per language'
        required: false
        default: '100'
      chunk_ms:
        description: 'Chunk tier (560 / 1120 / 2240 / 4480)'
        required: false
        default: '2240'

jobs:
  nemotron-multilingual-benchmark:
    name: Nemotron Multilingual Benchmark (FLEURS)
    runs-on: macos-15
    permissions:
      contents: read
      pull-requests: write
    env:
      HF_TOKEN: ${{ secrets.HF_NEMOTRON_V2_TOKEN }}
      SAMPLES: ${{ github.event.inputs.samples || '100' }}
      CHUNK_MS: ${{ github.event.inputs.chunk_ms || '2240' }}

    steps:
      - uses: actions/checkout@v5

      - uses: swift-actions/setup-swift@v2
        with:
          swift-version: "6.1"

      - name: Cache dependencies, models + datasets
        uses: actions/cache@v4
        with:
          path: |
            .build
            ~/Library/Application Support/FluidAudio
          key: ${{ runner.os }}-nemotron-multi-${{ hashFiles('Package.resolved', 'Sources/FluidAudio/ASR/Parakeet/Streaming/Nemotron/**', 'Sources/FluidAudio/ModelNames.swift') }}

      - name: Build
        run: swift build -c release

      - name: Benchmark — English → latin/ (WER)
        id: bench-en
        continue-on-error: true
        run: |
          echo "=== English FLEURS en_us, chunk ${CHUNK_MS}ms, ${SAMPLES} samples → latin/ ==="
          .build/release/fluidaudiocli nemotron-multilingual-benchmark \
            --auto-download \
            --languages en_us \
            --chunk-ms "$CHUNK_MS" \
            --dataset fleurs \
            --samples "$SAMPLES" \
            --output results-en.json \
            2>&1 | tee log-en.txt
          exit ${PIPESTATUS[0]}

      - name: Benchmark — Japanese → multilingual/ (CER)
        id: bench-ja
        continue-on-error: true
        run: |
          echo "=== Japanese FLEURS ja_jp, chunk ${CHUNK_MS}ms, ${SAMPLES} samples → multilingual/ ==="
          .build/release/fluidaudiocli nemotron-multilingual-benchmark \
            --auto-download \
            --languages ja_jp \
            --chunk-ms "$CHUNK_MS" \
            --dataset fleurs \
            --samples "$SAMPLES" \
            --output results-ja.json \
            2>&1 | tee log-ja.txt
          exit ${PIPESTATUS[0]}

      - name: Extract results
        if: always()
        id: extract
        run: |
          read_metric() { jq -r ".summary.$2 // \"N/A\"" "$1" 2>/dev/null || echo "N/A"; }
          pct() { [ "$1" = "N/A" ] && echo "N/A" || echo "$1 * 100" | bc -l | xargs printf "%.2f"; }
          one() { [ "$1" = "N/A" ] && echo "N/A" || echo "$1" | xargs printf "%.1f"; }

          EN_WER=$(pct "$(read_metric results-en.json averageWER)")
          EN_RTFX=$(one "$(read_metric results-en.json averageRTFx)")
          JA_CER=$(pct "$(read_metric results-ja.json averageCER)")
          JA_RTFX=$(one "$(read_metric results-ja.json averageRTFx)")
          SAMP=$(jq -r '.summary.totalSamples // "N/A"' results-en.json 2>/dev/null || echo "N/A")

          {
            echo "en_wer=$EN_WER"; echo "en_rtfx=$EN_RTFX"
            echo "ja_cer=$JA_CER"; echo "ja_rtfx=$JA_RTFX"
            echo "samples=$SAMP"
          } >> "$GITHUB_OUTPUT"

          echo "latin/        en  WER ${EN_WER}%  RTFx ${EN_RTFX}x"
          echo "multilingual/ ja  CER ${JA_CER}%  RTFx ${JA_RTFX}x"

          # Fail if either model produced no usable RTFx (download / decode failure)
          if [ "$EN_RTFX" = "N/A" ] || [ "$EN_RTFX" = "0.0" ] || [ "$JA_RTFX" = "N/A" ] || [ "$JA_RTFX" = "0.0" ]; then
            echo "❌ A model produced RTFx 0/N/A — benchmark failed"
            exit 1
          fi

      - name: Comment PR
        if: github.event_name == 'pull_request' && always()
        uses: actions/github-script@v7
        with:
          script: |
            const o = ${{ toJSON(steps.extract.outputs) }};
            const ok = '${{ steps.bench-en.outcome }}' === 'success' && '${{ steps.bench-ja.outcome }}' === 'success';
            const body = `## ${ok ? '✅' : '❌'} Nemotron Multilingual Benchmark — FLEURS

            chunk \`${{ env.CHUNK_MS }}ms\`, ${o.samples} samples/lang, B1 fused decode path. One language per shipped model.

            | Model | Language | Metric | RTFx |
            |---|---|---:|---:|
            | \`latin/\` | English | ${o.en_wer}% WER | ${o.en_rtfx}x |
            | \`multilingual/\` | Japanese | ${o.ja_cer}% CER | ${o.ja_rtfx}x |

            ${ok ? '' : '⚠️ One or both runs failed — see logs.'}

            <details><summary>Logs (tail)</summary>

            \`\`\`
            [latin / English]
            ${require('fs').existsSync('log-en.txt') ? require('fs').readFileSync('log-en.txt','utf8').slice(-1500) : '(no log)'}

            [multilingual / Japanese]
            ${require('fs').existsSync('log-ja.txt') ? require('fs').readFileSync('log-ja.txt','utf8').slice(-1500) : '(no log)'}
            \`\`\`
            </details>`;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body,
            });

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nemotron-multilingual-benchmark-results
          path: |
            results-*.json
            log-*.txt
          retention-days: 30

      - name: Fail if a run failed
        if: steps.bench-en.outcome == 'failure' || steps.bench-ja.outcome == 'failure'
        run: |
          echo "A benchmark run failed (see logs above)."
          exit 1
